<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Telegram Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            /* Используем переменные темы Telegram, чтобы цвета подстраивались под тему (темную/светлую) */
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }
    </style>
</head>
<body>
    <div class="container mt-3">
        <h4 class="mb-3">Предзагруженная таблица</h4>
        
        <div class="table-responsive">
            <table class="table table-striped border">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Товар</th>
                        <th>Цена</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td>1</td><td>Батарейки АА</td><td>150₽</td></tr>
                    <tr><td>2</td><td>Кабель Type-C</td><td>450₽</td></tr>
                    <tr><td>3</td><td>Разъем micro-USB</td><td>30₽</td></tr>
                </tbody>
            </table>
        </div>

        <button class="btn btn-primary w-100 mt-3" id="main-btn">Оформить заказ</button>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Пример взаимодействия
        document.getElementById('main-btn').addEventListener('click', () => {
            tg.showAlert("Данные отправлены!");
            // Можно закрыть приложение или отправить данные боту
            // tg.close(); 
        });
    </script>
</body>
</html>
