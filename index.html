<script type=module>
// const tg = window.Telegram.WebApp;
    // tg.expand();

    // document.documentElement.style.setProperty('--tg-viewport-height', tg.viewportHeight + 'px');

    const dynamicArea = document.getElementById('dynamic-zone');
    const scheduleList = document.getElementById('schedule-list');

    const teachersButton = document.getElementById("teachers-btn");

    const bottomSheet = document.getElementById("bottomSheet");

    let dynamicAreaInputField = null;

    let teachersList = new Map();
    let sortedTeachersIDsList = [];

    // none, teachersListOpened, teacherScheduleOpened
    let currentWorkingMode = "none";
    let mainList = new ItemsList(scheduleList, false);

    let _cachedTeachersSchedule = new Map();

    let _selectedTeacherID = 0;
    
    let _isBottomSheetOpened = false;

    let _currentDateState = null;

    let _sponsorsListHTML = null;

    mainList.OnSelectedEvent.attach(async (sender,args) => {
        await renderTeacherSchedule(sender.SelectedItem.ID);
    });
    
    teachersButton.addEventListener("click", () => {
        openSheet();
    });

    teachersList = await getTeachersList();
    _currentDateState = await getCurrent();
    processSponsorsListJSON(await getSponsorsList());

    async function renderTeacherSchedule(teacherId){
        const scheduleJson = await getTeacherSchedule(teacherId);

        mainList.Clear();
        let i = 1;
        scheduleJson.forEach((weekday, index) => {
            if (weekday.weekday == "502"){
                // Расписания нет. 
                showError("Ошибка на стороне ЛЭТИ", "Искомый преподаватель не зарегистрирован в системе расписания");
                console.warn("Нет расписания. 502");
                return;
            }
            const currentWeekdayNameObject = weekdayNum2Str(weekday.weekday);



            weekday.subjects.forEach((subject, index) => {
                const slotString = slot2PairTime(subject.slot);
                let m = new SubjectListItem(i, subject.name, subject.fullName, subject.type, subject.auditorium, currentWeekdayNameObject, slotString, subject.oddWeekGroups, subject.evenWeekGroups, (_currentDateState.week == 2 ? "EVEN" : (_currentDateState.week == 1 ? "ODD" : null)));
                
                m.OnClickEvent.attach((sender,args) => {
                    showInfo(null, `<span class="info-subtitle">${sender.FullName}</span>
                        <span class="info-subtitle">День недели: ${sender.WeekdayObject[0]}</span>
                        <span class="info-subtitle">Время: ${sender.Time}</span>
                        <span class="info-subtitle">Аудитория: ${sender.Auditorium}</span>
                        <span class="info-subtitle">Группы на чётной неделе:</span>
                        <span class="info-text">${sender.OddGroups}</span>
                        <span class="info-subtitle">Группы на нечётной неделе:</span>
                        <span class="info-text">${sender.EvenGroups}</span>`);
                });



                mainList.TryAddItem(m);
                i++
            });
        });   

        console.log(scheduleJson);
    }

    async function getTeachersList() {
        showLoader();

        try{
            const response = await fetch('http://195.66.114.126:9210/api/getTeachersList');
            
            if (!response.ok) {
                if (response.status == 502){
                    showError("Ошибка на стороне ЛЭТИ", "Сервер не отвечает");

                    hideLoader();

                    return null;
                }else{
                    showError("Ошибка", `Error while fetching teachers list: ${response.status}`);
                    throw new Error(`Error while fetching teachers list: ${response.status}`);
                }   
            }

            const data = JSON.parse(await DecompressFromBase64String(await response.text()));

            let output = new Map();

            data.forEach(t => {
                output.set(t.id, t);
            });

            hideLoader();

            return output;
        }catch(ex){
            showError("Ошибка", `Нет соединения с сервером`);
        }

        

        hideLoader();

        return null;
    }

    async function getTeacherSchedule(teacherId){
        if (_cachedTeachersSchedule.has(teacherId)){
            if ((_cachedTeachersSchedule.get(teacherId)[0].getTime() + 3 * 3600000) >= new Date().getTime()){
                // Если прошло меньше 3 часов с момента предыдущего обновления => не обновляем
                return _cachedTeachersSchedule.get(teacherId)[1];
            }
        }

        showLoader();
    
        try{
            const response = await fetch(`http://195.66.114.126:9210/api/getteacherscchedule?id=${teacherId}`);
        
            if (!response.ok) {
                if (response.status == 502){
                    console.warn(`Can't fetch teacher's schedule with id ${teacherId} because of server bad response`);
                    _cachedTeachersSchedule.set(teacherId, [new Date(), JSON.parse(`[{"weekday": "502"}]`)]);
                    hideLoader();
                    return JSON.parse(`[{"weekday": "502"}]`);
                }else{
                    throw new Error(`Error while fetching teacher schedule: ${response.status}`);
                    showError("Ошибка", `Error while fetching teachers list: ${response.status}`);
                }
            }

            const data = JSON.parse(await DecompressFromBase64String(await response.text()));

            _cachedTeachersSchedule.set(teacherId, [new Date(), data]);

            hideLoader();

            return data;

        }catch(ex){
            showError("Ошибка", `Нет соединения с сервером`);
        }


        hideLoader();

        return null;
    }

    async function getCurrent() {
        showLoader();

        try{
            const response = await fetch(`http://195.66.114.126:9210/api/getcurrent`);

            if (!response.ok) {
                if (response.status == 502){
                    showError("Ошибка на стороне ЛЭТИ", "Сервер не отвечает");

                    hideLoader();

                    return null;
                }else{
                    showError("Ошибка", `Error while fetching current: ${response.status}`);
                    throw new Error(`Error while fetching current: ${response.status}`);
                }
            }

            hideLoader();

            return response.json();
        }catch(ex){
            showError("Ошибка", `Нет соединения с сервером`);
        }


        hideLoader();

        return null;
    }

    async function getSponsorsList() {
        showLoader();

        try{
            const response = await fetch('http://195.66.114.126:9210/api/getSponsorsList');
            
            if (!response.ok) {
                showError("Ошибка", `Error while fetching sponsors list: ${response.status}`);
                throw new Error(`Error while fetching teachers list: ${response.status}`);
            }

            const data = JSON.parse(await DecompressFromBase64String(await response.text()));

            hideLoader();

            return data;
        }catch(ex){
            showError("Ошибка", `Нет соединения с сервером`);
        }

        hideLoader();

        return null;
    }

    const searchInput = document.getElementById('teacherSearch');
    const sheetList = document.getElementById('sheetList');
    const sheetOverlay = document.getElementById('bottomSheetOverlay');
    const sheetConfirmBtn = document.getElementById('confirmBtn');

    // Функция задержки, чтобы не искать на каждой букве
    function debounce(func, timeout = 300) {
        let timer;
        return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => { func.apply(this, args); }, timeout);
        };
    }

    const handleSearch = debounce((e) => {

        const query = e.target.value.toLowerCase().trim();
        if (query.length >= 3){
            // Выполняем поиск
            sortedTeachersIDsList = [];

            for (let t of teachersList.values()) {
                if ((t.name + " " + t.surname + " " + t.midname).toLowerCase().includes(query)){
                    sortedTeachersIDsList.push(t.id);
                }
            }
            
            // foundedTeachersCount.textContent = `Найдено: ${sortedTeachersIDsList.length}`;
            // displayedTeachersCount.textContent = `Отображено: ${Math.min(50, sortedTeachersIDsList.length)}`;
            renderTeachersListToBottomSheet(sortedTeachersIDsList, 50);
        }else{
            renderTeachersListToBottomSheet([], 1900);
            // foundedTeachersCount.textContent = "Найдено: 0";
            // displayedTeachersCount.textContent = "Отображено: 0";
        }
    });

    function renderTeachersListToBottomSheet(teachersIDs, limit) {
        sheetList.innerHTML = ''; // Очищаем старое

        // Нужно, чтобы если мы печатали новые буквы, то выделение не спадало
        let hasSelectedItemInSight = false;
        if (teachersIDs.length === 0) {
            sheetList.innerHTML = '<div class="p-3 text-center text-muted">Ничего не найдено</div>';
        }else{
            const fragment = document.createDocumentFragment();

            let i = 0;
            teachersIDs.forEach(id => {
                if (i == limit){
                    return;
                }
                i++;
                let foundedTeacher = teachersList.get(id);

                const btn = document.createElement('button');
                // Используем классы Bootstrap для красоты
                btn.className = 'list-group-item list-group-item-action border-0 py-3';
                btn.textContent = (foundedTeacher.surname + " " + foundedTeacher.name + " " + foundedTeacher.midname);
                btn.style.setProperty("transition", "all 1s ease-out;");

                // Логика клика
                btn.onclick = () => {
                    // Убираем подсветку у предыдущего
                    const active = sheetList.querySelector('.selected');
                    if (active) active.classList.remove('selected');
                    
                    // Подсвечиваем текущий
                    btn.classList.add('selected');
                    
                    // Сохраняем данные и активируем кнопку
                    _selectedTeacherID = id;
                    sheetConfirmBtn.disabled = false;
                };

                
                if (_selectedTeacherID == id){
                    hasSelectedItemInSight = true;
                    btn.click();
                }
                
                fragment.appendChild(btn);       
            });

            sheetList.appendChild(fragment);
        }

        if (hasSelectedItemInSight == false){
            _selectedTeacherID = 0;
            const active = sheetList.querySelector('.selected');
            if (active) active.classList.remove('selected');

            sheetConfirmBtn.disabled = true;
        }        
    }

    searchInput.addEventListener('input', handleSearch);
    sheetOverlay.addEventListener('click', () => {
        if (_isBottomSheetOpened){
            closeSheet();
        }
    });

    function openSheet() {
        _isBottomSheetOpened = true;
        bottomSheet.classList.add('active');
        sheetOverlay.style.display = 'block';
    }

    function closeSheet() {
        _isBottomSheetOpened = false;
        bottomSheet.classList.remove('active');
        sheetOverlay.style.display = 'none';
    }

    // Обработка финального подтверждения
    sheetConfirmBtn.onclick = () => {
        if (_selectedTeacherID) {
            closeSheet(); // Закрываем шторку
            
            renderTeacherSchedule(_selectedTeacherID);
        }
    };

    // Sponsors button logic

    function processSponsorsListJSON(data){
        _sponsorsListHTML = `<div class="accordion-container">`;

        data.forEach(s => {
            _sponsorsListHTML += `<div class="accordion-item">
                <div class="accordion-header">
                    <span class="amount">${s.amount} ₽</span>
                    <span class="name">${s.name}</span>
                </div>
                <div class="accordion-content">
                    <div class="content-inner">
                        <p>${s.comment}</p>
                    </div>
                </div>
            </div>`;
        });

        _sponsorsListHTML += "</div>";
    }

    const sponsorsButton = document.getElementById("sponsors-btn");
    sponsorsButton.addEventListener("click", () => {
        showInfo("Список сопонсоров", _sponsorsListHTML);
        
        document.querySelectorAll('.accordion-header').forEach(header => {
            header.addEventListener('click', () => {
                const item = header.parentElement;
                const content = item.querySelector('.accordion-content');
                const isActive = item.classList.contains('active');

                // 1. Закрываем все остальные открытые элементы (опционально)
                document.querySelectorAll('.accordion-item').forEach(otherItem => {
                    otherItem.classList.remove('active');
                    otherItem.querySelector('.accordion-content').style.maxHeight = null;
                });

                // 2. Если текущий элемент не был активен, открываем его
                if (!isActive) {
                    item.classList.add('active');
                    // Устанавливаем max-height равным полной высоте контента
                    content.style.maxHeight = content.scrollHeight + "px";
                }
            });
        });

        // Закрытие при клике на само описание
        document.querySelectorAll('.accordion-content').forEach(content => {
            content.addEventListener('click', () => {
                content.style.maxHeight = null;
                content.parentElement.classList.remove('active');
            });
        });
    });
</script>
